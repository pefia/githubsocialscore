name: Update Social Score Card

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate SVG cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: node scripts/generate-score-card.mjs
      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add assets/social-score-light.svg assets/social-score-dark.svg
          git diff --staged --quiet || git commit -m "chore: update social score cards"
          git push
