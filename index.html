<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Social Score</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        h1 { text-align: center; }
        input[type='text'] { width: 100%; padding: 10px; margin: 10px 0; }
        button { padding: 10px; width: 100%; background-color: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .result { margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>GitHub Social Score</h1>
        <input type="text" id="username" placeholder="Enter GitHub Username" />
        <button id="getScore">Get Social Score</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        document.getElementById('getScore').addEventListener('click', function() {
            const username = document.getElementById('username').value;
            const url = `https://api.github.com/users/${username}`;
            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('User not found');
                    }
                    return response.json();
                })
                .then(data => {
                    const { followers, public_repos, public_gists } = data;
                    const score = followers + public_repos + public_gists;
                    document.getElementById('result').innerHTML = `<h2>${username}'s Social Score: ${score}</h2>`;
                })
                .catch(error => {
                    document.getElementById('result').innerHTML = `<h2 style='color:red;'>${error.message}</h2>`;
                });
        });
    </script>
</body>
</html>
